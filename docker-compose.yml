version: "3.9"

services:
  assistant-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8094:8090"
    environment:
      - ERP_PLATFORM_BASE_URL=http://host.docker.internal:8091

  assistant-core:
    build: ./services/assistant-core

  connector-hub:
    build: ./services/connector-hub

  action-engine:
    build: ./services/action-engine

  memory-service:
    build: ./services/memory-service
    ports:
      - "8204:8080"

  redis:
    image: redis:7

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_assistant

  briefing-service:
    build: ./services/briefing-service

  voice-service:
    build: ./services/voice-service
    ports:
      - "8208:8080"
