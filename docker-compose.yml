version: '3.9'
services:
  assistant-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - 8094:8090
    environment:
    - ERP_PLATFORM_BASE_URL=http://host.docker.internal:8091
  assistant-core:
    build: ./services/assistant-core
  connector-hub:
    build: ./services/connector-hub
  action-engine:
    build: ./services/action-engine
  memory-service:
    build: ./services/memory-service
    ports:
    - 8204:8080
  redis:
    image: redis:7
  briefing-service:
    build: ./services/briefing-service
  voice-service:
    build: ./services/voice-service
    ports:
    - 8208:8080
x-shared-infra:
  hasura_graphql_url: ${ERP_SHARED_HASURA_URL:-http://localhost:8090/v1/graphql}
  postgres_url: ${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}
  iam_url: ${ERP_SHARED_IAM_URL:-http://localhost:8081}
  otlp_endpoint: ${ERP_SHARED_OTLP_ENDPOINT:-http://localhost:4317}
