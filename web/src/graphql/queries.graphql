### assistant_sessions ###

query GetAssistantSessions(
  $where: assistant_sessions_bool_exp
  $order_by: [assistant_sessions_order_by!]
  $limit: Int
  $offset: Int
) {
  assistant_sessions(
    where: $where
    order_by: $order_by
    limit: $limit
    offset: $offset
  ) {
    id
    user_id
    title
    status
    mode
    model
    messages
    context
    started_at
    ended_at
    created_at
    updated_at
  }
  assistant_sessions_aggregate(where: $where) {
    aggregate {
      count
    }
  }
}

query GetAssistantSessionById($id: String!) {
  assistant_sessions_by_pk(id: $id) {
    id
    user_id
    title
    status
    mode
    model
    messages
    context
    started_at
    ended_at
    created_at
    updated_at
  }
}

