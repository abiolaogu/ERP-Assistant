### assistant_sessions ###

subscription OnAssistantSessions {
  assistant_sessions(limit: 100, order_by: { updated_at: desc }) {
    id
    user_id
    title
    status
    mode
    model
    messages
    context
    started_at
    ended_at
    created_at
    updated_at
  }
}

subscription OnAssistantSessionById($id: String!) {
  assistant_sessions_by_pk(id: $id) {
    id
    user_id
    title
    status
    mode
    model
    messages
    context
    started_at
    ended_at
    created_at
    updated_at
  }
}

