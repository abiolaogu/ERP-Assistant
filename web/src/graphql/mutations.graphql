### assistant_sessions ###

mutation CreateAssistantSession($object: assistant_sessions_insert_input!) {
  insert_assistant_sessions_one(object: $object) {
    id
    user_id
    title
    status
    mode
    model
    messages
    context
    started_at
    ended_at
    created_at
    updated_at
  }
}

mutation UpdateAssistantSession($id: String!, $set: assistant_sessions_set_input!) {
  update_assistant_sessions_by_pk(pk_columns: { id: $id }, _set: $set) {
    id
    user_id
    title
    status
    mode
    model
    messages
    context
    started_at
    ended_at
    created_at
    updated_at
  }
}

mutation DeleteAssistantSession($id: String!) {
  delete_assistant_sessions_by_pk(id: $id) {
    id
  }
}

