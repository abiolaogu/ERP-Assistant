apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: erp-assistant-slo-alerts
  labels:
    app: erp-assistant
spec:
  groups:
    - name: erp-assistant.slo
      rules:
        - alert: ERPAssistantHighLatencyP95
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.250
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ERP-Assistant p95 latency is above target"
        - alert: ERPAssistantAvailabilityBudgetBurn
          expr: (1 - (sum(rate(http_requests_total{status!~"5.."}[15m])) / sum(rate(http_requests_total[15m])))) > 0.000500
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "ERP-Assistant error budget burn is above threshold"
