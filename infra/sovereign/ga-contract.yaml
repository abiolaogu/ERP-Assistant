apiVersion: sovereign.billyronks/v1
kind: GATargetContract
metadata:
  name: erp-assistant
  generatedAt: "2026-02-28"
spec:
  category: "Enterprise AI Assistant"
  benchmarks:
    - "Microsoft Copilot"
    - "Notion AI"
    - "Slack AI"
  northStar: "Provide a trustworthy, context-rich assistant that can act across the full ERP estate."
  tenancy:
    model: hard-multi-tenant
    db:
      engine: yugabytedb
      isolation: rls-plus-tenant-context
    cache:
      engine: dragonflydb
      namespacePattern: tenant:{tenant_id}:*
    events:
      broker: redpanda
      topicPattern: tenant.{tenant_id}.{domain}.*
      requiredTopics:
        - "assistant.runs"
        - "assistant.approvals"
        - "assistant.events"
    realtime:
      engine: centrifugo
      channelPattern: tenant:{tenant_id}:{resource}
  reliability:
    availability: "99.95%"
    p95LatencyMs: 250
    mttrMinutes: 20
  releaseGates:
    - lint
    - test
    - build
    - policy-check
    - security-scan
    - deployment-verification
  operations:
    runbooksRequired: true
    rollbackWindowMinutes: 15
    gameDayRequired: true
