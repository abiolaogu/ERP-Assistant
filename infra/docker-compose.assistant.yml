version: "3.9"

services:
  # ---------- Backend services ----------

  assistant-core:
    build:
      context: ../services/assistant-core
    ports:
      - "18701:8080"
    environment:
      PORT: "8080"
      MODULE_NAME: "ERP-Assistant"
      DATABASE_URL: "${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  memory-service:
    build:
      context: ../services/memory-service
    ports:
      - "18702:8080"
    environment:
      PORT: "8080"
      MODULE_NAME: "ERP-Assistant"
      DATABASE_URL: "${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  briefing-service:
    build:
      context: ../services/briefing-service
    ports:
      - "18703:8080"
    environment:
      PORT: "8080"
      MODULE_NAME: "ERP-Assistant"
      DATABASE_URL: "${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  connector-hub:
    build:
      context: ../services/connector-hub
    ports:
      - "18704:8080"
    environment:
      PORT: "8080"
      MODULE_NAME: "ERP-Assistant"
      DATABASE_URL: "${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  action-engine:
    build:
      context: ../services/action-engine
    ports:
      - "18705:8080"
    environment:
      PORT: "8080"
      MODULE_NAME: "ERP-Assistant"
      DATABASE_URL: "${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  voice-service:
    build:
      context: ../services/voice-service
    ports:
      - "18706:8080"
    environment:
      PORT: "8080"
      MODULE_NAME: "ERP-Assistant"
      DATABASE_URL: "${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Gateway ----------

  erp-assistant-gateway:
    build:
      context: ../cmd/server
      dockerfile: ../../services/assistant-core/Dockerfile
    ports:
      - "8090:8090"
    command: ["./service"]
    environment:
      PORT: "8090"
      MODULE_NAME: "ERP-Assistant"
      ASSISTANT_CORE_URL: "http://assistant-core:8080"
      MEMORY_SERVICE_URL: "http://memory-service:8080"
      BRIEFING_SERVICE_URL: "http://briefing-service:8080"
      CONNECTOR_HUB_URL: "http://connector-hub:8080"
      ACTION_ENGINE_URL: "http://action-engine:8080"
      VOICE_SERVICE_URL: "http://voice-service:8080"
    depends_on:
      - postgres

  # ---------- Infrastructure ----------

  hasura:
    image: hasura/graphql-engine:v2.40.0
    ports:
      - "19110:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: "${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}"
      HASURA_GRAPHQL_METADATA_DATABASE_URL: "${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}"
      HASURA_GRAPHQL_ADMIN_SECRET: "${HASURA_ADMIN_SECRET:-hasura-admin-secret}"
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"RS256","jwk_url":"${JWK_URL:-http://identity-service:8080/.well-known/jwks.json}","claims_namespace":"https://erp.io/jwt/claims","claims_format":"json","claims_map":{"x-hasura-allowed-roles":{"path":"$$.roles"},"x-hasura-default-role":{"path":"$$.default_role"},"x-hasura-user-id":{"path":"$$.user_id"},"x-hasura-tenant-id":{"path":"$$.tenant_id"}}}'
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup,http-log,webhook-log,websocket-log,query-log"
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_CORS_DOMAIN: "*"
      HASURA_GRAPHQL_ENABLE_APOLLO_FEDERATION: "true"
      ACTIONS_BASE_URL: "http://erp-assistant-gateway:8090"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: erp_assistant
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    volumes:
      - assistant-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6387:6379"
    volumes:
      - assistant-redis:/data

volumes:
  assistant-pgdata:
  assistant-redis:
